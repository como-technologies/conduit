# Throwaway Gitea for the conduit spike (spec §Self-dogfood). Disposable:
# `just forge-down` removes the container AND the volume. Nothing here ever
# leaves localhost.
services:
  gitea:
    image: gitea/gitea:1.24
    container_name: conduit-gitea
    environment:
      - GITEA__security__INSTALL_LOCK=true
      # FORGE_PORT: host port for the throwaway forge (default 3000) —
      # lets the demo coexist with dev servers that own 3000 (Next.js et al).
      - GITEA__server__ROOT_URL=http://localhost:${FORGE_PORT:-3000}/
      - GITEA__server__HTTP_PORT=3000
      - GITEA__service__DISABLE_REGISTRATION=false
      - GITEA__webhook__ALLOWED_HOST_LIST=*
    ports:
      - "${FORGE_PORT:-3000}:3000"
    volumes:
      - gitea-data:/data
volumes:
  gitea-data:
